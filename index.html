<!DOCTYPE html>
<html>
<body>
    <h1>My Website</h1>
    <p>This is a simple paragraph on my new page.</p>
    <p>hi Victoria!</p>

    <p>Count: <span id="display">0</span></p>

    <button onclick="addOne()">Add 1</button>

    <script>
        // 1. Try to find the "count" cookie when the page loads
        let cookieValue = document.cookie.split("; ").find((row) => row.startsWith("count="));
        
        // 2. If the cookie exists, use it. Otherwise, start at 0.
        let count = cookieValue ? parseInt(cookieValue.split("=")[1]) : 0;

        // 3. Update the display immediately with the saved number
        document.getElementById("display").innerHTML = count;

        function addOne() {
            count = count + 1;
            document.getElementById("display").innerHTML = count;

            // 4. Save the new count to the cookie (expires in 1 year)
            document.cookie = "count=" + count + "; max-age=31536000; path=/";
        }
    </script>
</body>
</html>
